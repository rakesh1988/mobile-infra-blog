name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-drafts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check draft frontmatter
        run: |
          for f in drafts/*.md; do
            [ -f "$f" ] || continue
            if ! head -1 "$f" | grep -q '^---$'; then
              echo "ERROR: $f is missing frontmatter (must start with ---)"
              exit 1
            fi
            echo "OK: $f"
          done
